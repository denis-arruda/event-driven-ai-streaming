services:

  kafka:
    image: apache/kafka:latest
    environment:
      KAFKA_NODE_ID: 0
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,EXTERNAL://:9094,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
      - "9094:9094"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10

  content-enrichment:
    image: denisarruda/content-enrichment:1.0-SNAPSHOT
    ports:
      - "9090:8080"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LLM_API_KEY: ${LLM_API_KEY}
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/q/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  sensitivity-compliance:
    image: denisarruda/sensitivity-compliance:1.0-SNAPSHOT
    ports:
      - "9091:8080"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LLM_API_KEY: ${LLM_API_KEY}
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/q/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  marketing-narrative:
    image: denisarruda/marketing-narrative:1.0-SNAPSHOT
    ports:
      - "9093:8080"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LLM_API_KEY: ${LLM_API_KEY}
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/q/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
