# Kafka
mp.messaging.incoming.ai-content-finalized.connector=smallrye-kafka
mp.messaging.incoming.ai-content-finalized.topic=ai-content-finalized
mp.messaging.incoming.ai-content-finalized.group.id=frontend-web
mp.messaging.incoming.ai-content-finalized.auto.offset.reset=earliest
mp.messaging.incoming.ai-content-finalized.commit-strategy=ignore

mp.messaging.outgoing.content-published.connector=smallrye-kafka
mp.messaging.outgoing.content-published.topic=content-published
mp.messaging.outgoing.content-published.value.serializer=org.apache.kafka.common.serialization.StringSerializer

kafka.bootstrap.servers=localhost:9092

# OTEL
quarkus.application.name=frontend-web
quarkus.otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
quarkus.otel.exporter.otlp.protocol=grpc

# Logging — traceId/spanId injected via OTEL MDC integration
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] (%t) traceId=%X{traceId} spanId=%X{spanId} %s%e%n

# Container Image
quarkus.container-image.group=denisarruda
quarkus.container-image.name=frontend-web
quarkus.container-image.tag=${quarkus.application.version:latest}
